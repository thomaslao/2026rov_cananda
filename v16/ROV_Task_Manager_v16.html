<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROV Task Manager v16</title>
  <style>
:root {
    --navy: #1F3864; --blue: #2F5496; --lblue: #BDD7EE;
    --red: #C00000; --orange: #ED7D31; --yellow: #FFD966;
    --green: #70AD47; --lgreen: #E2EFDA; --grey: #F2F2F2;
    --white: #fff; --text: #1a1a1a; --border: #D0D7E3;
    --shadow: 0 2px 12px rgba(0,0,0,0.10); --bg: #EEF2F8;
    --muted: #666; --input-bg: #fff; --table-hover: #F5F8FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); }
  @media (prefers-color-scheme: dark) {
    :root {
      --navy:#0F1F38; --blue:#6FA8DC; --lblue:#243B55; --red:#FF6B6B;
      --orange:#F6A04D; --yellow:#C8A84A; --green:#8BCF6A; --lgreen:#213A25;
      --grey:#1C2430; --white:#141B24; --text:#E8EEF7; --border:#334155;
      --shadow:0 2px 12px rgba(0,0,0,.45); --bg:#0B111A; --muted:#A8B3C4;
      --input-bg:#101826; --table-hover:#172235;
    }
  }
  [data-theme="light"] {
    --navy: #1F3864; --blue: #2F5496; --lblue: #BDD7EE;
    --red: #C00000; --orange: #ED7D31; --yellow: #FFD966;
    --green: #70AD47; --lgreen: #E2EFDA; --grey: #F2F2F2;
    --white: #fff; --text: #1a1a1a; --border: #D0D7E3;
    --shadow: 0 2px 12px rgba(0,0,0,0.10); --bg: #EEF2F8;
    --muted: #666; --input-bg: #fff; --table-hover: #F5F8FF;
  }
  [data-theme="dark"] {
    --navy:#0F1F38; --blue:#6FA8DC; --lblue:#243B55; --red:#FF6B6B;
    --orange:#F6A04D; --yellow:#C8A84A; --green:#8BCF6A; --lgreen:#213A25;
    --grey:#1C2430; --white:#141B24; --text:#E8EEF7; --border:#334155;
    --shadow:0 2px 12px rgba(0,0,0,.45); --bg:#0B111A; --muted:#A8B3C4;
    --input-bg:#101826; --table-hover:#172235;
  }

  /* ── NAV ── */
  nav { background: var(--navy); color: #fff; padding: 6px 20px;
        display: flex; align-items: center; gap: 6px; min-height: 56px;
        position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3);
        overflow-x:auto; scrollbar-width:thin; }
  nav .logo { font-size: 1.15rem; font-weight: 700; margin-right: 12px; white-space: nowrap; }
  .tab-btn { background: none; border: none; color: rgba(255,255,255,.75);
             min-height: 44px; padding: 8px 13px; border-radius: 6px; cursor: pointer;
             font-size: .88rem; font-weight: 600; transition: .15s; white-space: nowrap; }
  .tab-btn:hover, .tab-btn.active { background: rgba(255,255,255,.18); color: #fff; }
  .mode-subnav { position: sticky; top:56px; z-index:90; background:var(--white); border-bottom:1px solid var(--border);
                 display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:9px 20px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
  .mode-tab { border:1px solid var(--border); background:var(--input-bg); color:var(--text); border-radius:99px;
              min-height:44px; padding:9px 15px; cursor:pointer; font-weight:800; font-size:.86rem; }
  .mode-tab.active { background:var(--blue); border-color:var(--blue); color:#fff; }
  .nav-spacer { flex: 1; }
  #save-btn { background: var(--green); border: none; color: #fff; padding: 6px 14px;
              border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 700; }
  .toast {
    position: fixed;
    top: 70px;
    right: 18px;
    z-index: 220;
    max-width: min(360px, calc(100vw - 28px));
    padding: 10px 14px;
    border-radius: 8px;
    box-shadow: 0 8px 26px rgba(0,0,0,.18);
    color: #fff;
    font-size: .86rem;
    font-weight: 900;
    line-height: 1.35;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: toastIn .18s ease-out;
  }
  .toast span { min-width: 0; }
  .toast-undo {
    flex: 0 0 auto;
    min-height: 30px;
    border: 1px solid rgba(255,255,255,.55);
    border-radius: 6px;
    padding: 4px 9px;
    background: rgba(255,255,255,.16);
    color: #fff;
    cursor: pointer;
    font-weight: 900;
  }
  .toast-undo:hover { background: rgba(255,255,255,.26); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  .undo-bar {
    position: sticky;
    top: 56px;
    z-index: 95;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    min-height: 44px;
    padding: 7px 16px;
    background: #FFF3CD;
    color: #6F4E00;
    border-bottom: 1px solid rgba(127,96,0,.2);
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    font-size: .84rem;
    font-weight: 900;
  }
  .undo-bar span { min-width: 0; }
  @keyframes toastIn {
    from { transform: translateY(-6px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ── LAYOUT ── */
  .page { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
  .page.active { display: block; }
  h1 { font-size: 1.4rem; color: var(--navy); margin-bottom: 16px; }
  h2 { font-size: 1.05rem; color: var(--blue); margin: 18px 0 10px; border-left: 4px solid var(--blue); padding-left: 10px; }

  /* ── CARDS ── */
  .card { background: var(--white); border-radius: 10px; padding: 16px 20px;
          box-shadow: var(--shadow); margin-bottom: 16px; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 9px; }
  .dashboard-stat-card { appearance:none; width:100%; border:0; text-align:left; color:var(--text); cursor:pointer; transition:transform .12s ease, box-shadow .12s ease, background .12s ease; }
  .dashboard-stat-card:hover { background:var(--table-hover); transform:translateY(-1px); box-shadow:0 8px 18px rgba(0,0,0,.10); }
  .dashboard-stat-card:focus-visible { outline:3px solid rgba(47,84,150,.25); outline-offset:2px; }
  .dashboard-chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:stretch; }
  .dashboard-chart-card { min-width:0; }
  .task-status-counts { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin-bottom:12px; }
  .task-status-count { border:1px solid var(--border); border-left:5px solid var(--blue); border-radius:8px; padding:8px; background:var(--input-bg); min-width:0; }
  .task-status-count div { font-size:.76rem; color:var(--muted); font-weight:900; }
  .task-status-count strong { display:block; font-size:1.12rem; font-weight:900; margin-top:3px; }
  .task-pie-wrap { display:flex; justify-content:center; align-items:center; min-height:210px; }
  .task-pie { width:min(210px, 72%); aspect-ratio:1; border-radius:50%; box-shadow:inset 0 0 0 2px rgba(255,255,255,.9); }
  .task-burndown-wrap { width:100%; overflow:hidden; min-height:250px; }
  .task-burndown-svg { width:100%; height:250px; display:block; }
  .task-chart-legend { display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap; color:var(--muted); font-size:.78rem; font-weight:850; }
  .task-chart-legend span { display:inline-flex; align-items:center; gap:6px; }
  .task-chart-legend i { display:inline-block; width:28px; height:10px; border-radius:2px; }
  .stat-card { background: var(--white); border-radius: 7px; padding: 10px;
               box-shadow: var(--shadow); text-align: center; border-top: 4px solid var(--blue); }
  .stat-num { font-size: 1.35rem; font-weight: 800; color: var(--navy); }
  .stat-label { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .chart-grid { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 16px; margin: 16px 0; }
  .chart-box { height: 260px; position: relative; }
  .competition-hero { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .competition-tile { background:var(--white); border-radius:12px; padding:18px; box-shadow:var(--shadow); border-top:5px solid var(--blue); text-align:center; }
  .competition-num { font-size:2rem; font-weight:900; color:var(--navy); line-height:1.1; }
  .competition-label { font-size:.8rem; color:var(--muted); margin-top:5px; }
  .command-shell { display:grid; grid-template-columns:1fr; gap:12px; align-items:start; }
  .command-topbar { position:sticky; top:112px; z-index:20; background:#0B3954; color:#fff; border-radius:14px;
                    padding:10px 12px; margin-bottom:12px; display:grid; grid-template-columns:repeat(5,minmax(140px,1fr)); gap:9px; align-items:stretch; overflow-x:auto; }
  .command-metric-card { min-height:82px; min-width:0; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:10px; padding:8px; display:flex; flex-direction:column; justify-content:center; }
  .command-metric-label { font-size:.7rem; opacity:.78; font-weight:900; margin-bottom:5px; }
  .command-metric-card input { width:100%; min-height:34px; border:none; border-radius:7px; padding:4px 7px; font-weight:900; font-size:1.05rem; text-align:center; }
  .command-timer { font-variant-numeric:tabular-nums; font-family:Consolas, "SFMono-Regular", monospace; font-size:clamp(1.55rem,3.5vw,2.65rem); font-weight:900; line-height:.95; }
  .command-timer.overtime { color:var(--red); animation:cccBlink 1s ease-in-out infinite; }
  @keyframes cccBlink { 0%,100%{opacity:1} 50%{opacity:.42} }
  .command-score { font-variant-numeric:tabular-nums; font-size:clamp(1.55rem,3.1vw,2.35rem); font-weight:900; line-height:.95; color:#A9D18E; }
  .command-score-row { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:6px; }
  .command-score-pill { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:9px; padding:6px; }
  .command-score-pill label { display:block; font-size:.66rem; opacity:.78; font-weight:900; margin-bottom:3px; }
  .command-score-pill input { width:100%; min-height:32px; border:none; border-radius:7px; padding:4px 7px; font-weight:900; font-size:1.05rem; text-align:center; }
  .rov-status { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:5px; }
  .rov-status button, .touch-btn { min-width:38px; min-height:38px; }
  .rov-status button { border:none; border-radius:99px; padding:5px 7px; cursor:pointer; font-weight:900; font-size:.72rem; background:rgba(255,255,255,.14); color:#fff; }
  .rov-status button.active { outline:3px solid rgba(255,255,255,.45); }
  .command-warning { position:sticky; bottom:0; z-index:30; padding:12px 16px; border-radius:12px; background:#FFF3CD; color:#856404; font-weight:900; text-align:center; margin-top:12px; }
  .command-warning.danger { background:#C00000; color:#fff; animation:blinkWarn 1s step-start infinite; }
  .autosave-status { font-size:.78rem; color:var(--muted); margin:-4px 0 10px; text-align:right; font-weight:700; }
  body.competition-focus .autosave-status { color:#B9C8DA; }
  @keyframes blinkWarn { 50% { filter:brightness(1.35); } }
  #page-competition .check-item input { width:24px; height:24px; flex:0 0 auto; }
  .quick-score-layout { display:grid; grid-template-columns:minmax(220px,.75fr) minmax(360px,1.25fr) minmax(220px,.8fr); gap:12px; align-items:start; }
  .quick-score-stack { display:grid; gap:8px; }
  .quick-score-field { display:grid; grid-template-columns:88px minmax(0,1fr); gap:8px; align-items:center; }
  .quick-score-field label { margin:0; font-weight:900; color:var(--navy); }
  .quick-score-list { max-height:420px; overflow:auto; border:1px solid var(--border); border-radius:10px; padding:6px; }
  .quick-score-option { display:grid; grid-template-columns:28px minmax(0,1fr) auto; gap:8px; align-items:center; min-height:44px; padding:8px 7px; border-bottom:1px solid var(--border); cursor:pointer; }
  .quick-score-option input { width:22px; height:22px; margin:0; }
  .quick-score-option span { min-width:0; line-height:1.35; }
  .quick-score-actions { display:grid; gap:8px; }
  .quick-score-panel label { min-height:36px; }
  .quick-score-panel .btn, .quick-score-panel input, .quick-score-panel select, .quick-score-panel textarea { min-height:44px; }
  .live-action { border-left:5px solid var(--orange); padding:12px 14px; background:var(--white); border-radius:8px; box-shadow:var(--shadow); margin-bottom:10px; }
  body.competition-focus { background:#081827; }
  body.competition-focus nav { display:none; }
  body.competition-focus .mode-subnav { display:none; }
  body.competition-focus #page-competition { max-width:none; padding:18px; }
  body.competition-focus #page-competition h1 { color:#fff; }
  body.competition-focus #page-competition .card,
  body.competition-focus #page-competition .competition-tile { box-shadow:0 10px 28px rgba(0,0,0,.25); }
  body.competition-focus .command-topbar { top:18px; background:#061421; border:1px solid rgba(255,255,255,.16); box-shadow:0 14px 36px rgba(0,0,0,.4); }
  body.competition-focus .command-shell { grid-template-columns:1fr; }
  body.competition-focus .competition-controls,
  body.competition-focus .competition-hero { display:none; }
  body.competition-focus #page-competition .card,
  body.competition-focus .live-action { background:#10243A; color:#EAF3FF; border-color:#2E4A67; }
  body.competition-focus #page-competition h2,
  body.competition-focus #page-competition strong { color:#fff; }
  body.competition-focus #page-competition .stat-label,
  body.competition-focus #page-competition .competition-label,
  body.competition-focus #page-competition .check-owner,
  body.competition-focus #page-competition .check-time { color:#B9C8DA; }
  body.competition-focus .stat-card { background:#10243A; border-color:#2E4A67; }
  .competition-focus-bar { display:none; position:sticky; top:0; z-index:45; margin:-4px 0 12px;
    background:#061421; color:#fff; border:1px solid rgba(255,255,255,.16); border-radius:12px;
    box-shadow:0 12px 28px rgba(0,0,0,.28); padding:10px 12px; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; }
  body.competition-focus .competition-focus-bar { display:grid; }
  .competition-focus-title { font-size:.78rem; opacity:.74; font-weight:900; text-transform:uppercase; letter-spacing:.04em; }
  .competition-focus-status { display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:.86rem; font-weight:900; }
  .competition-focus-pill { display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:5px 9px; background:rgba(255,255,255,.12); color:#fff; }
  .competition-focus-actions { display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end; }
  .competition-focus-actions .btn { min-height:42px; }
  .strategy-score { font-size:1rem; font-weight:900; color:var(--navy); }
  .strategy-top { background:rgba(112,173,71,.14); }
  .practice-grid { display:grid; grid-template-columns: 340px 1fr; gap:16px; align-items:start; }
  .metric-mini { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:99px; background:#EEF2F8; font-size:.75rem; color:#555; margin-right:4px; }
  .score-grid { display:grid; grid-template-columns: 360px 1fr; gap:16px; align-items:start; }
  .score-total { font-size:2.15rem; font-weight:900; color:var(--green); line-height:1; }
  .score-total.negative { color:var(--red); }
  .score-card { border-left:5px solid var(--green); }
  .prep-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
  .risk-dot { width:12px; height:12px; border-radius:99px; display:inline-block; margin-right:6px; }
  .risk-red { background:var(--red); }
  .risk-orange { background:var(--orange); }
  .risk-green { background:var(--green); }
  .directive-card { border-left:5px solid var(--blue); padding:12px 14px; border-radius:8px; background:#F8FBFF; margin-bottom:8px; }
  .handoff-card { border:1px solid var(--border); border-radius:8px; padding:10px 12px; background:var(--white); }
  .prep-view-hidden { display:none !important; }
  .contact-team-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; margin-bottom:14px; }
  .contact-team-card { border:1px solid var(--border); border-radius:10px; padding:12px; background:var(--white); }
  .contact-dropzone { min-height:138px; display:grid; gap:7px; align-content:start; }
  .contact-person-card { border:1px solid var(--border); border-radius:8px; padding:8px 9px; background:#F8FBFF; cursor:grab; }
  .contact-empty-slot { padding:8px 9px; border:1px dashed var(--border); border-radius:8px; color:var(--muted); font-weight:800; background:var(--input-bg); }
  .contact-member-row { display:grid; grid-template-columns:28px 1fr 150px; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); cursor:grab; }

  @media print {
    body.competition-print-mode { background:#fff !important; }
    body.competition-print-mode nav,
    body.competition-print-mode .competition-controls,
    body.competition-print-mode .modal-bg,
    body.competition-print-mode #toast,
    body.competition-print-mode #export-toast { display:none !important; }
    body.competition-print-mode .page:not(#page-competition) { display:none !important; }
    body.competition-print-mode #page-competition { display:block !important; padding:0 !important; max-width:none !important; }
    body.competition-print-mode .card,
    body.competition-print-mode .competition-tile { box-shadow:none !important; border:1px solid #ddd; break-inside:avoid; }
    body.competition-print-mode .competition-hero { grid-template-columns:repeat(3, 1fr); }
    body.competition-print-mode .check-item input { transform:scale(1.25); }
  }

  /* ── PROGRESS BAR ── */
  .prog-wrap { background: #E0E8F0; border-radius: 99px; height: 10px; overflow: hidden; }
  .prog-bar { height: 100%; border-radius: 99px; transition: width .4s; }

  /* ── TAGS / BADGES ── */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 99px;
           font-size: .75rem; font-weight: 700; }
  .badge.urgent { background: #FFD6D6; color: var(--red); }
  .badge.high { background: #FCE4D6; color: var(--orange); }
  .badge.mid { background: #FFF3CD; color: #856404; }
  .badge.done { background: var(--lgreen); color: #375623; }
  .badge.inprog { background: #D6EAF8; color: #1A5276; }

  /* ── TASK TABLE ── */
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { background: var(--navy); color: #fff; padding: 9px 10px; text-align: left; }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--table-hover); }
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  .task-done td { opacity: .55; text-decoration: line-through; }
  .task-done td:first-child { text-decoration: none; }
  .task-overdue td { background: #FFF7F7 !important; }
  .task-overdue:hover td { background: #FFEFEF !important; }
  .task-row-clickable { cursor: pointer; }
  .task-row-clickable td.no-click { cursor: default; }
  .task-locked td { background: #F7F7F7 !important; color: #777; }
  .task-lock-note { color: var(--orange); font-size: .72rem; margin-top: 3px; font-weight: 700; }
  .dep-pill { display:inline-block; background:#EEF2F8; color:#555; border-radius:99px; padding:2px 8px; font-size:.72rem; margin-top:4px; }
  .attachment-list { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
  .attachment-item { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 8px; border:1px solid #E1E7F0; border-radius:6px; background:#F8FAFF; font-size:.82rem; }
  .attachment-item a { color: var(--blue); font-weight: 600; text-decoration: none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .drag-handle { cursor: grab; color: #999; font-weight: 800; user-select: none; }
  .sortable-ghost { opacity: .45; background: var(--lblue) !important; }
  .batch-bar { display:none; gap:8px; flex-wrap:wrap; align-items:center; padding:10px 14px; margin-bottom:10px; border:1px solid var(--border); border-radius:8px; background:var(--white); box-shadow:var(--shadow); }
  .batch-bar.show { display:flex; }
  /* Mission Run 備註／賽中事件：保留換行以便閱讀 */
  .mission-note-cell { white-space: pre-wrap; word-break: break-word; line-height: 1.45; max-width: min(520px, 42vw); }

  label {
    display: grid;
    gap: 4px;
    align-content: start;
  }
  select, input[type=text], input[type=date], input[type=url], input[type=number], textarea {
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px;
    font-size: .85rem; width: 100%; font-family: inherit; background: var(--input-bg); color: var(--text); }
  select { width: auto; min-width: 100px; }
  input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  button.btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
               font-weight: 600; font-size: .85rem; transition: .15s; }
  button.btn:hover { opacity: .85; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-sm { padding: 3px 9px; font-size: .78rem; }
  .task-summary-row { position:relative; z-index:1; display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:8px; margin-bottom:10px; }
  .task-summary-card { min-height:76px; text-align:left; border:1px solid var(--task-summary-active, var(--border)); border-left:4px solid var(--task-summary-accent, var(--green)); border-radius:8px; background:var(--task-summary-bg, var(--input-bg)); padding:8px; cursor:pointer; color:var(--text); display:flex; flex-direction:column; justify-content:center; min-width:0; }
  .task-summary-card:hover { background:var(--table-hover); }
  .task-summary-label { font-size:.73rem; color:var(--muted); font-weight:900; line-height:1.2; overflow-wrap:anywhere; }
  .task-summary-value { font-size:1.15rem; font-weight:900; line-height:1.1; margin-top:7px; }
  .task-sort-th { padding:0; }
  .task-sort-button { width:100%; min-height:38px; padding:8px 12px; border:0; background:transparent; color:inherit; cursor:pointer; display:flex; align-items:center; justify-content:flex-start; gap:6px; font:inherit; font-weight:900; text-align:left; white-space:nowrap; word-break:keep-all; }
  .task-sort-button:hover, .task-sort-button:focus-visible { background:rgba(255,255,255,.12); outline:none; }
  .task-sort-button span { min-width:12px; font-weight:900; }
  .task-table-wrap { overflow:auto; border:1px solid var(--border); border-radius:8px; }
  .task-table-wrap table { min-width:1180px; table-layout:auto; }
  .task-col-name, .task-name-cell { width:360px; max-width:360px; }
  .task-name-cell { overflow-wrap:anywhere; }
  .task-col-owner, .task-owner-cell { min-width:112px; white-space:nowrap; word-break:keep-all; }
  .task-col-due, .task-due-cell { min-width:128px; white-space:nowrap; word-break:keep-all; }
  .task-col-priority, .task-priority-cell { min-width:43px; white-space:nowrap; word-break:keep-all; text-align:center; }
  .task-col-category, .task-category-cell { min-width:148px; white-space:nowrap; }
  .task-col-status, .task-status-table-cell { min-width:96px; white-space:nowrap; }
  .task-actions-cell { min-width:132px; white-space:nowrap; }
  .task-status-cell { display:block; min-width:84px; }
  .task-status-select { width:84px; min-width:84px; height:32px; margin:0; }
  .task-category-select { width:135px; min-width:135px; height:32px; margin:0; }
  .task-action-row { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-end; align-items:center; min-width:116px; }
  .task-action-row .btn-sm { width:55px; min-height:32px; padding:4px 8px; white-space:nowrap; }
  .task-filter-bar { position:relative; z-index:1; display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:8px; align-items:end; margin-bottom:8px; }
  .task-filter-bar label { min-width:0; }
  .task-filter-bar select { width:100%; min-width:0; }
  .task-toolbar-actions { position:relative; z-index:2; display:grid; grid-template-columns:repeat(4,minmax(170px,1fr)); gap:10px; align-items:stretch; margin-bottom:10px; }
  .task-toolbar-btn { min-height:42px; padding:8px 14px; font-size:.88rem; font-weight:900; border-radius:8px; white-space:normal; }
  .task-toolbar-search { min-height:42px; margin:0; padding:0; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:6px; align-items:stretch; min-width:0; }
  .task-toolbar-search label { margin:0; min-width:0; }
  .task-toolbar-search input { height:42px; min-height:42px; margin:0; border-radius:8px; font-size:.88rem; font-weight:800; line-height:1.2; }
  .task-search-submit { min-height:42px; padding:8px 14px; border-radius:8px; font-size:.88rem; font-weight:900; white-space:nowrap; }
  .task-toolbar-clear { background:#FFF3CD; color:#7A4B00; border:1px solid rgba(245,158,11,.45); box-shadow:inset 0 0 0 1px rgba(255,255,255,.55); }
  .task-toolbar-clear:hover { background:#FDE68A; opacity:1; }
  .task-category-manager { border:1px solid var(--border); border-left:5px solid var(--blue); border-radius:8px; background:var(--input-bg); padding:10px; margin-bottom:10px; }
  .task-category-manager-head { display:flex; justify-content:space-between; gap:10px; align-items:start; margin-bottom:8px; }
  .task-category-manager-head h3 { margin:0 0 4px; color:var(--navy); font-size:.96rem; }
  .task-category-manager-head div div { font-size:.8rem; color:var(--muted); font-weight:800; }
  .task-category-add-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; align-items:center; margin-bottom:10px; }
  .task-category-add-row input { min-height:34px; }
  .task-category-groups { display:grid; gap:10px; }
  .task-category-group { display:grid; gap:6px; }
  .task-category-group-title { font-size:.82rem; font-weight:900; color:var(--navy); }
  .task-category-table { display:grid; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--white); }
  .task-category-row { display:grid; grid-template-columns:54px minmax(120px,1fr) minmax(150px,1.2fr) minmax(110px,.9fr) auto; gap:8px; align-items:center; padding:7px 8px; border-top:1px solid var(--border); font-size:.78rem; font-weight:800; }
  .task-category-row:first-child { border-top:0; }
  .task-category-row-head { background:#EEF3FB; color:var(--navy); font-size:.73rem; font-weight:900; }
  .task-category-row span { min-width:0; overflow-wrap:anywhere; }
  .prep-entry-row { display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:8px; align-items:end; }
  .prep-gear-entry-row { display:grid; grid-template-columns:minmax(0,2fr) minmax(0,1fr) 90px auto auto; gap:8px; align-items:end; }

  /* ── GANTT ── */
  .gantt-wrap { overflow-x: auto; }
  .gantt-table { border-collapse: collapse; font-size: .78rem; min-width: 900px; }
  .gantt-table th, .gantt-table td { border: 1px solid #dde3ee; padding: 4px 5px; white-space: nowrap; }
  .gantt-table th { background: var(--navy); color: #fff; text-align: center; }
  .gantt-cell { width: 22px; min-width: 22px; }
  .g-bar { background: var(--blue); border-radius: 3px; opacity: .85; }
  .g-exam { background: #F8696B; }
  .g-pres { background: #4472C4; }
  .g-eng { background: var(--orange); }
  .g-admin { background: #7030A0; }
  .g-weekend { background: #F0F0F0 !important; }

  /* ── CHECKLIST ── */
  .check-section { margin-bottom: 12px; }
  .check-section h3 { font-size: .92rem; font-weight: 700; padding: 6px 12px;
                      border-radius: 6px; margin-bottom: 6px; }
  .check-section.sec-A h3 { background: #FFD6D6; color: var(--red); }
  .check-section.sec-B h3 { background: #FCE4D6; color: var(--orange); }
  .check-section.sec-C h3 { background: #FFF3CD; color: #7F6000; }
  .check-section.sec-D h3 { background: var(--lgreen); color: #375623; }
  .check-section.sec-E h3 { background: var(--lblue); color: var(--navy); }
  .check-section.sec-F h3 { background: #E8DAEF; color: #5B2C6F; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px;
                border-bottom: 1px solid #EEF0F5; }
  .check-item:hover { background: #F7FAFF; }
  .check-item label { flex: 1; cursor: pointer; font-size: .88rem; }
  .check-qty {
    flex: 0 0 auto;
    min-width: 40px;
    text-align: center;
    font-weight: 800;
    font-size: .82rem;
    color: var(--navy);
    background: #E8EEF8;
    border-radius: 6px;
    padding: 2px 8px;
  }
  body.competition-focus #page-competition .check-qty {
    color: #fff;
    background: rgba(255,255,255,.18);
  }
  .check-owner { font-size: .75rem; color: #888; white-space: nowrap; }
  .check-time { font-size: .75rem; color: #aaa; white-space: nowrap; }
  .checked label { text-decoration: line-through; color: #aaa; }

  /* ── MEMBER CARDS ── */
  .member-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 14px; }
  .member-card { background: var(--white); border-radius: 10px; padding: 14px 16px;
                 box-shadow: var(--shadow); border-left: 4px solid var(--blue);
                 position: relative; }
  .member-card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
  .member-name { font-size: 1rem; font-weight: 700; color: var(--navy); padding-right: 70px; }
  .member-role { font-size: .78rem; color: #888; margin-bottom: 8px; }
  .member-tasks { font-size: .82rem; }
  .member-status { display: inline-block; padding: 2px 8px; border-radius: 99px;
                   font-size: .72rem; font-weight: 700; margin-top: 6px; }
  .ms-confirmed { background: #D5F5E3; color: #1E8449; }
  .ms-pending   { background: #FEF9E7; color: #856404; }
  .ms-no        { background: #FADBD8; color: #922B21; }
  .member-tasks-list { margin-top: 8px; }
  .member-tasks-list .task-item { padding: 3px 0; border-bottom: 1px solid #F0F0F0; font-size: .82rem; display: flex; align-items: center; gap: 6px; }
  .member-role-view { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:10px; }
  .member-role-group { border:1px solid var(--border); border-left:5px solid var(--blue); border-radius:8px; background:var(--input-bg); padding:9px 10px; }
  .member-role-chip { display:inline-flex; align-items:center; gap:4px; border:1px solid var(--border); background:var(--white); border-radius:99px; padding:4px 8px; margin:4px 4px 0 0; font-size:.8rem; font-weight:800; }
  .owner-settings-grid { display:grid; grid-template-columns: minmax(220px,.55fr) minmax(320px,1fr); gap:12px; align-items:start; }
  .owner-chip-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .owner-chip { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); border-radius:99px; background:var(--input-bg); padding:5px 8px; font-size:.8rem; font-weight:800; }
  .owner-chip button { border:0; background:transparent; color:var(--red); cursor:pointer; font-weight:900; padding:0 2px; }
  .owner-compare-table { max-height:320px; overflow:auto; border:1px solid var(--border); border-radius:8px; }
  .owner-compare-table table { margin:0; }
  .owner-source-badge { display:inline-block; border-radius:99px; padding:2px 7px; font-size:.7rem; font-weight:900; background:#E8EEF8; color:var(--navy); }
  @media (max-width: 900px) { .owner-settings-grid { grid-template-columns:1fr; } }

  /* ── MODAL ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
              align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 520px;
           max-width: 95vw; max-height: 90vh; overflow-y: auto;
           box-shadow: 0 8px 40px rgba(0,0,0,.2); }
  .modal.wide { width: 620px; }
  .modal h3 { font-size: 1.1rem; color: var(--navy); margin-bottom: 14px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* tasks input in member modal */
  .task-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .task-input-row input { flex: 1; }
  .task-input-row button { flex-shrink: 0; padding: 5px 10px; background: var(--red); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .8rem; }
  #member-tasks-list-edit { margin-bottom: 8px; }

  /* ── TIMELINE ── */
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content:''; position:absolute; left:10px; top:0; bottom:0;
                      width:2px; background: var(--lblue); }
  thead th { cursor: default; }
  thead th[onclick] { cursor: pointer; transition: background .15s; }
  thead th[onclick]:hover { background: rgba(0,90,180,.07); }
  .tl-item { position: relative; margin-bottom: 14px; }
  .tl-dot { position:absolute; left:-23px; top:4px; width:14px; height:14px;
            border-radius:50%; border:3px solid var(--white); box-shadow: 0 0 0 2px var(--blue); }
  .tl-dot.urgent { box-shadow: 0 0 0 2px var(--red); background: var(--red); }
  .tl-dot.done   { background: var(--green); box-shadow: 0 0 0 2px var(--green); }
  .tl-date { font-size: .75rem; color: #888; margin-bottom: 2px; }
  .tl-content { background: var(--white); border-radius: 8px; padding: 10px 14px;
                box-shadow: var(--shadow); font-size: .88rem; }

  /* ── NOTES ── */
  .quote-item { border-left: 4px solid var(--blue); padding: 8px 14px; margin: 8px 0; color: #444; font-style: italic; background: #f8f9ff; border-radius: 0 6px 6px 0; display:flex; align-items:flex-start; gap:8px; }
  .quote-item:nth-child(3n+1) { border-color: var(--blue); background:#f0f5ff; }
  .quote-item:nth-child(3n+2) { border-color: var(--green); background:#f0fff4; }
  .quote-item:nth-child(3n+0) { border-color: var(--orange); background:#fff8f0; }
  .quote-text { flex:1; font-size:.9rem; line-height:1.6; }
  .quote-actions { display:flex; gap:4px; flex-shrink:0; opacity:.4; transition:opacity .2s; }
  .quote-item:hover .quote-actions { opacity:1; }
  #notes-area { width:100%; height:180px; resize:vertical; padding:10px;
                border:1px solid var(--border); border-radius:8px; font-size:.88rem; }

  /* ── SKELETON LOADER ── */
  .skeleton-card { background: var(--white); border-radius:10px; padding:16px 20px; box-shadow:var(--shadow); margin-bottom:16px; }
  .skeleton-line { height:12px; border-radius:99px; margin:9px 0; background:linear-gradient(90deg, rgba(150,160,180,.18), rgba(150,160,180,.34), rgba(150,160,180,.18)); background-size:200% 100%; animation:skeleton-wave 1.1s ease-in-out infinite; }
  .skeleton-line.short { width:42%; }
  .skeleton-line.mid { width:68%; }
  @keyframes skeleton-wave { 0%{background-position:200% 0} 100%{background-position:-200% 0} }


  /* ── TOAST ── */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
           background:var(--navy); color:#fff; padding:10px 22px; border-radius:8px;
           font-size:.88rem; font-weight:600; z-index:999; opacity:0;
           transition:all .3s cubic-bezier(.16,1,.3,1); pointer-events:none; box-shadow:0 4px 20px rgba(0,0,0,.3); }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:#F0F4FB; }
  ::-webkit-scrollbar-thumb { background:#B0BDD6; border-radius:3px; }

  @media(max-width:600px){
    nav { flex-wrap: wrap; height: auto; padding: 8px 12px; gap:4px; }
    .tab-btn { font-size:.8rem; padding:7px 9px; min-height:42px; }
    .page { padding: 12px; }
    .card { padding: 12px; }
    .chart-grid { grid-template-columns: 1fr; }
    .dashboard-chart-grid { grid-template-columns: 1fr; }
    .task-status-counts { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .task-summary-row { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .task-filter-bar { grid-template-columns:1fr; }
    .task-toolbar-actions { grid-template-columns:1fr; }
    .task-toolbar-search { grid-template-columns:1fr; }
    .prep-entry-row,
    .prep-gear-entry-row { grid-template-columns:1fr; }
    .task-toolbar-search input,
    .task-search-submit,
    .task-toolbar-btn,
    [data-checklist-add],
    [data-gear-add] { min-height:46px; }
    .competition-hero, .practice-grid, .score-grid, .prep-grid, .command-shell, .quick-score-layout { grid-template-columns: 1fr; }
    .command-topbar { position:static; grid-template-columns: 1fr; overflow-x:visible; }
    .quick-score-field { grid-template-columns:1fr; gap:4px; }
    .mode-subnav { top:auto; position:static; padding:8px 12px; }
    .mode-tab { flex:1 1 calc(50% - 8px); min-height:42px; padding:8px 10px; }
  }

  /* ── NAV BADGE (逾期角標) ── */
  .nav-badge-wrap { position: relative; display: inline-flex; align-items: center; }
  .nav-badge { position: absolute; top: -6px; right: -8px; background: var(--red);
               color: #fff; font-size: .62rem; font-weight: 800; border-radius: 99px;
               min-width: 16px; height: 16px; padding: 0 4px;
               display: flex; align-items: center; justify-content: center;
               pointer-events: none; line-height: 1; animation: badge-pop .25s ease; }
  .nav-badge.warning { background: var(--orange); }
  .nav-badge.danger { background: var(--red); }
  .nav-badge.hidden { display: none; }
  @keyframes badge-pop { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .badge[onclick] { cursor:pointer; user-select:none; min-width:64px; display:inline-block; text-align:center; }
  .badge[onclick]:hover { filter:brightness(1.08); transform:scale(1.03); }
  details.card > summary { cursor:pointer; list-style:none; font-weight:900; color:var(--navy); display:flex; align-items:center; justify-content:space-between; gap:10px; }
  details.card > summary::-webkit-details-marker { display:none; }
  details.card > summary::after { content:'展開'; font-size:.74rem; color:var(--muted); border:1px solid var(--border); border-radius:99px; padding:2px 8px; }
  details.card[open] > summary::after { content:'收合'; }
  .sync-status { display:inline-flex; align-items:center; gap:6px; min-height:26px; padding:4px 9px; border-radius:999px; border:1px solid rgba(255,255,255,.24); background:rgba(255,255,255,.12); color:#fff; font-size:.78rem; font-weight:900; line-height:1; }
  .sync-status-dot { width:8px; height:8px; border-radius:999px; background:#cbd5e1; box-shadow:0 0 0 2px rgba(255,255,255,.12); }
  .sync-status.ok .sync-status-dot { background:var(--green); }
  .sync-status.syncing .sync-status-dot { background:var(--blue); animation:sync-pulse 1s ease-in-out infinite; }
  .sync-status.pending .sync-status-dot { background:var(--orange); }
  .sync-status.error { background:rgba(192,0,0,.24); border-color:rgba(255,255,255,.35); }
  .sync-status.error .sync-status-dot { background:var(--red); }
  @keyframes sync-pulse { 0%,100%{opacity:.45;transform:scale(.85)} 50%{opacity:1;transform:scale(1.15)} }
  .card-header { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  .card-header-title { color:var(--navy); font-weight:900; margin:0; }
  .card-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; align-items:center; }
  .page-topbar { display:grid; grid-template-columns:minmax(180px,.8fr) minmax(220px,1.2fr) auto; gap:12px; align-items:center; margin-bottom:12px; }
  .page-top-title { color:var(--navy); font-weight:900; font-size:1rem; }
  .page-top-summary { color:var(--muted); font-size:.84rem; font-weight:800; line-height:1.45; }
  .page-top-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .long-table-wrap { padding:0; overflow:auto; margin-top:10px; }
  .task-workbench-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
  .task-workbench-column { border:1px solid var(--border); border-radius:8px; background:var(--input-bg); padding:8px; min-height:110px; }
  .task-workbench-card { border:1px solid var(--border); border-left:4px solid var(--blue); border-radius:8px; background:var(--white); padding:8px; margin-top:8px; }
  .task-workbench-card.risk { border-left-color:var(--red); }
  .task-workbench-card.blocked { border-left-color:#7030A0; }
  .task-daily-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
  .task-daily-card { border:1px solid var(--border); border-left:5px solid var(--blue); border-radius:8px; background:var(--input-bg); padding:10px; min-width:0; }
  .task-daily-card h3 { font-size:.9rem; color:var(--navy); margin:0; display:flex; justify-content:space-between; gap:8px; align-items:center; }
  .task-daily-count { font-size:1.35rem; font-weight:900; font-variant-numeric:tabular-nums; }
  .task-daily-item { width:100%; text-align:left; border:1px solid var(--border); border-radius:7px; background:var(--white); color:var(--text); padding:7px 8px; margin-top:7px; cursor:pointer; }
  .task-daily-item:hover { background:var(--table-hover); }
  .task-daily-meta { font-size:.74rem; color:var(--muted); margin-top:3px; font-weight:800; }
  .task-advanced-table-wrap summary { cursor:pointer; font-weight:900; color:var(--navy); }
  .dashboard-safety-card { border-left:4px solid var(--blue); }
  .dashboard-safety-header { display:grid; grid-template-columns:minmax(260px,1fr) minmax(320px,auto); gap:12px; align-items:start; }
  .dashboard-safety-copy { min-width:0; }
  .dashboard-safety-hint { font-size:.8rem; color:var(--muted); font-weight:800; margin-top:3px; line-height:1.45; }
  .dashboard-safety-save { font-size:.78rem; color:var(--muted); font-weight:900; margin-top:5px; }
  .dashboard-safety-actions { display:grid; gap:7px; justify-items:end; }
  .dashboard-action-group { display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; padding:6px; border:1px solid var(--border); border-radius:8px; background:var(--input-bg); }

const __src_utils_date_js = (() => {

function todayDateString(date = new Date()) {
  return date.toISOString().slice(0, 10);
}

function toDateInputValue(date) {
  const d = new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getWeekStart(date = new Date()) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d;
}

function getTaskDueInfo(task, today = new Date()) {
  if (!task?.due) return { days: null };
  const start = new Date(today);
  start.setHours(0, 0, 0, 0);
  const due = new Date(task.due);
  due.setHours(0, 0, 0, 0);
  return { days: Math.ceil((due - start) / 86400000) };
}

function isOverdue(due, now = new Date()) {
  if (!due) return false;
  const d = new Date(due);
  d.setHours(23, 59, 59);
  return d < now;
}

function getOverdueDays(due, today = new Date()) {
  if (!due) return 0;
  const start = new Date(today);
  start.setHours(0, 0, 0, 0);
  const d = new Date(due);
  d.setHours(0, 0, 0, 0);
  return Math.max(0, Math.floor((start - d) / 86400000));
}

function formatMissionTime(seconds) {
  const safe = Math.max(0, Number(seconds) || 0);
  const h = Math.floor(safe / 3600);
  const m = Math.floor((safe % 3600) / 60);
  const s = safe % 60;
  return h > 0
    ? `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
    : `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

return { todayDateString, toDateInputValue, getWeekStart, getTaskDueInfo, isOverdue, getOverdueDays, formatMissionTime };
})();

const __src_utils_dom_js = (() => {

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(value) {
  return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function safeJsonParse(raw, fallback = null) {
  try {
    return raw ? JSON.parse(raw) : fallback;
  } catch (error) {
    return fallback;
  }
}

return { escapeHtml, escapeAttr, safeJsonParse };
})();

function normalizeTask(row, index) {
  return {
    id: Number(row.id || index + 1),
    name: String(row.name || row.title || `Task ${index + 1}`),
    owner: String(row.owner || 'Unassigned'),
    due: String(row.due || ''),

    category: String(row.category || row.cat || 'General'),
    blocked: Boolean(row.blocked || row.depends_on),
    notes: String(row.notes || row.note || ''),
  };
}

function normalizeDedupeText(value) {
  return String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
}

function dedupeRows(rows = [], keyFn = row => row?.id, preferFn = (current) => current) {
  const byKey = new Map();
  const duplicates = [];
  rows.forEach((row) => {
    const key = keyFn(row);
    if (!key) return;
    if (!byKey.has(key)) {
      byKey.set(key, row);
      return;
    }
    duplicates.push(row);
    byKey.set(key, preferFn(byKey.get(key), row));
  });
  return {
    rows: [...byKey.values()],
    duplicates,
  };
}

function preferRicherMember(current, next) {
  const currentScore = [current.role, current.group].filter(Boolean).join('|').length;
  const nextScore = [next.role, next.group].filter(Boolean).join('|').length;
  return nextScore >= currentScore ? next : current;
}

function taskDedupeKey(task) {
  return [
    normalizeDedupeText(task.name),
    normalizeDedupeText(task.due),
    normalizeDedupeText(task.category),
  ].join('|');
}

function preferRicherTask(current, next) {
  const statusRank = { Done: 3, Completed: 3, 'In Progress': 2, Open: 1 };
  const score = task => [
    task.notes,
    task.category,
    task.owner,
    task.due,
    ...(Array.isArray(task.evidence) ? task.evidence.map(item => item.label || item.url || item.note) : []),
  ].filter(Boolean).join('|').length;
  const currentStatus = statusRank[current.status] || 0;
  const nextStatus = statusRank[next.status] || 0;
  if (nextStatus !== currentStatus) return nextStatus > currentStatus ? next : current;
  return score(next) >= score(current) ? next : current;
}

function attachEvidenceToTasks(tasks = [], attachments = []) {
  const byTask = new Map();
  attachments.forEach((attachment) => {
    if (!attachment.taskId) return;
    const evidence = byTask.get(attachment.taskId) || [];
    evidence.push({
      id: attachment.id,
      label: attachment.label,
      url: attachment.url,
      note: attachment.note,
      type: attachment.type,
    });
    byTask.set(attachment.taskId, evidence);
  });
  return tasks.map(task => ({
    ...task,
    evidence: [...(Array.isArray(task.evidence) ? task.evidence : []), ...(byTask.get(Number(task.id)) || [])],
  }));
}

  const startedAt = performance.now();
  const results = await Promise.allSettled([
    selectTable(client, 'tasks'),
    selectTable(client, 'members'),
    selectTable(client, 'checklist_items', 'order_index'),
    selectTable(client, 'predive_checklist_items', 'order_index'),

    selectTable(client, 'notes'),
    selectTable(client, 'quotes', 'order_index'),
    selectTable(client, 'task_attachments', 'created_at'),
    selectTable(client, 'audit_log', 'created_at', false),
    selectTable(client, 'strategy_items'),
    selectTable(client, 'practice_runs'),
    selectTable(client, 'mission_runs'),
  ]);

  const tables = {};
  results.forEach((result) => {
    if (result.status === 'fulfilled') {
      tables[result.value.table] = {
        ok: !result.value.error,
        count: result.value.data.length,
        error: result.value.error?.message || '',
      };
    }
  });

  const get = table => (results.find(result => result.status === 'fulfilled' && result.value.table === table)?.value.data || []);
  const attachments = get('task_attachments').map(normalizeTaskAttachment);
  const dedupedTasks = dedupeRows(get('tasks').map(normalizeTask), taskDedupeKey, preferRicherTask);
  const dedupedMembers = dedupeRows(get('members').map(normalizeMember), member => normalizeDedupeText(member.name), preferRicherMember);
  const dedupedChecklist = dedupeRows(get('checklist_items').map(normalizeChecklistItem), item => `${item.id}|${normalizeDedupeText(item.label)}`);
  const dedupedPrediveChecklist = dedupeRows(get('predive_checklist_items').map(normalizeChecklistItem), item => `${item.id}|${normalizeDedupeText(item.label)}`);
  const dedupedQuotes = dedupeRows(get('quotes').map(normalizeQuote).filter(quote => quote.text), quote => normalizeDedupeText(quote.text));
  const tasks = attachEvidenceToTasks(dedupedTasks.rows, attachments);
  return {
    loadedAt: new Date().toISOString(),
    loadMs: Math.round(performance.now() - startedAt),
    source: SUPABASE_SOURCE_LABEL,
    readOnly: true,
    tables,
    dedupeSummary: {
      tasks: dedupedTasks.duplicates.length,
      members: dedupedMembers.duplicates.length,
      checklist: dedupedChecklist.duplicates.length,

      notes: String(get('notes')[0]?.content || ''),

      strategy: get('strategy_items'),
      practiceRuns: get('practice_runs').map(normalizePracticeRun),
      missionRuns: get('mission_runs').map(normalizeMissionRun),
    },
  };
}

function buildSupabaseReadOnlyImportDelta(beforeData = {}, importedData = {}) {
  const rows = [
    ['tasks', 'Tasks'],
    ['members', 'Members'],
    ['checklist', 'Checklist'],
    ['prediveChecklist', 'Pre-dive'],
    ['intel', 'Intel'],

    return { key, label, before, after, delta: after - before };
  });

    increased: rows.filter(row => row.delta > 0).length,

}

async function probeSupabaseSchema(client = null, candidates = SCHEMA_PROBE_COLUMNS) {
  if (!client) client = await ensureSupabaseClient();
  if (!client) throw new Error('Supabase client is unavailable');
  const startedAt = performance.now();
  const tables = {};

  for (const [table, columns] of Object.entries(candidates)) {
    const existing = [];
    const missing = [];
    for (const column of columns) {
      const { error } = await client.from(table).select(column).limit(1);
      if (error) missing.push({ column, error: error.message || String(error) });
      else existing.push(column);
    }
    tables[table] = {
      existing,
      missing,
      coverage: columns.length ? Math.round((existing.length / columns.length) * 100) : 0,
    };
  }

  return {
    ts: new Date().toISOString(),
    probeMs: Math.round(performance.now() - startedAt),
    tables,
  };
}

return { createSupabaseClient, ensureSupabaseClient, loadSupabaseReadOnly, buildSupabaseReadOnlyImportDelta, applySupabaseReadOnlyData, probeSupabaseSchema, SUPABASE_URL, SUPABASE_KEY, DB_TABLES, SUPABASE_SOURCE_LABEL, SCHEMA_PROBE_COLUMNS };
})();

function getId(row) {

function comparable(row) {
  const copy = { ...(row || {}) };
  delete copy.created_at;
  delete copy.updated_at;
  return JSON.stringify(copy, Object.keys(copy).sort());
}

function diffFields(local = {}, remote = {}) {
  const ignored = new Set(['created_at', 'updated_at']);
  const keys = new Set([...Object.keys(local || {}), ...Object.keys(remote || {})]);
  return [...keys]
    .filter(key => !ignored.has(key))
    .filter(key => JSON.stringify(local?.[key] ?? null) !== JSON.stringify(remote?.[key] ?? null))
    .map(key => ({
      field: key,
      local: local?.[key] ?? null,
      remote: remote?.[key] ?? null,
    }));
}

function diffRows(localRows = [], remoteRows = []) {
  const remoteById = new Map(remoteRows.map(row => [getId(row), row]).filter(([id]) => id));
  const localById = new Map(localRows.map(row => [getId(row), row]).filter(([id]) => id));
  const create = [];
  const update = [];
  const remove = [];

  localById.forEach((local, id) => {
    const remote = remoteById.get(id);
    if (!remote) {
      create.push(local);
      return;
    }
    if (comparable(local) !== comparable(remote)) update.push(local);
  });

  remoteById.forEach((remote, id) => {
    if (!localById.has(id)) remove.push(remote);
  });

  return { create, update, remove };
}

function diffRowDetails(localRows = [], remoteRows = []) {
  const remoteById = new Map(remoteRows.map(row => [getId(row), row]).filter(([id]) => id));

    if (!localById.has(id)) remove.push({ id, label: remote.name || remote.label || remote.note || id, row: remote });

function getMissingColumnFromError(error) {
  const message = String(error?.message || '');
  const match = message.match(/Could not find the '([^']+)' column/i)
    || message.match(/column "([^"]+)" .*does not exist/i);
  return match?.[1] || '';
}

function dropFieldFromRows(rows = [], field = '') {
  if (!field) return rows;
  return rows.map((row) => {
    const next = { ...row };
    delete next[field];
    return next;
  });
}

async function upsertRowsWithSchemaFallback(client, table, rows, conflict) {
  let nextRows = rows;
  const droppedFields = [];
  for (let attempt = 0; attempt < 6; attempt += 1) {
    const { error } = await client.from(table).upsert(nextRows, { onConflict: conflict });
    if (!error) return { error: null, rows: nextRows, droppedFields };
    const missingField = getMissingColumnFromError(error);
    if (!missingField || droppedFields.includes(missingField)) return { error, rows: nextRows, droppedFields };
    droppedFields.push(missingField);
    nextRows = dropFieldFromRows(nextRows, missingField);
  }
  return { error: new Error('Schema fallback exceeded retry limit'), rows: nextRows, droppedFields };
}

async function deleteRows(client, table, rows = []) {
  if (!rows.length) return { error: null, deleted: 0 };
  const idColumn = table === 'checklist_items' || table === 'predive_checklist_items'
    ? 'item_id'
    : 'id';
  const ids = rows
    .map(row => row?.[idColumn] ?? row?.id ?? row?.item_id)
    .filter(value => value !== undefined && value !== null && value !== '');
  if (!ids.length) return { error: null, deleted: 0 };
  const { error } = await client.from(table).delete().in(idColumn, ids);
  return { error, deleted: error ? 0 : ids.length };
}

function getAllowedFields(table, schemaStatus = null) {
  const staticAllowed = WRITE_SCHEMA[table] || [];
  const probed = schemaStatus?.tables?.[table]?.existing;
  if (!Array.isArray(probed) || !probed.length) return staticAllowed;
  return staticAllowed.filter(field => probed.includes(field));
}

function filterRowForSchema(table, row, schemaStatus = null) {
  const allowed = getAllowedFields(table, schemaStatus);
  return Object.fromEntries(
    Object.entries(row || {}).filter(([key, value]) => allowed.includes(key) && value !== undefined),
  );
}

function validateRowsForSchema(table, rows = [], schemaStatus = null) {
  const allowed = getAllowedFields(table, schemaStatus);
  if (!allowed.length) {
    return [{ table, row: 0, field: '*', message: 'Table is not in write schema whitelist' }];
  }
  const violations = [];
  rows.forEach((row, rowIndex) => {
    Object.keys(row || {}).forEach((field) => {
      if (!allowed.includes(field)) {
        violations.push({ table, row: rowIndex, field, message: 'Field is not writable' });
      }
    });
  });
  return violations;
}

function cleanMasterValue(value) {
  return String(value || '').trim();
}

function uniqueSorted(values) {
  return [...new Set(values.map(cleanMasterValue).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'en'));
}

function uniqueTaskCategories(values) {
  const cleaned = [...new Set(values.map(cleanMasterValue).filter(Boolean))];
  const defaults = DEFAULT_TASK_CATEGORIES.filter(category => cleaned.includes(category));
  const custom = cleaned
    .filter(category => !DEFAULT_TASK_CATEGORIES.includes(category))
    .sort((a, b) => a.localeCompare(b, 'en'));
  return [...defaults, ...custom];
}

function getMasterData(state) {
  const data = state?.data?.masterData || {};
  return Object.fromEntries(
    Object.keys(MASTER_DATA_TYPES).map(type => [
      type,
      type === 'taskTypes' ? uniqueTaskCategories(data[type] || []) : uniqueSorted(data[type] || []),
    ]),
  );
}

function ensureDefaultTaskCategories(state) {
  const current = getMasterData(state);
  const nextTaskTypes = uniqueSorted([...(current.taskTypes || []), ...DEFAULT_TASK_CATEGORIES]);
  if (nextTaskTypes.length === (current.taskTypes || []).length) return false;
  state.data.masterData = {
    ...current,
    taskTypes: nextTaskTypes,
  };
  state.dirtyFlags.masterData = true;
  return true;
}

function loadMasterData(state) {
  return getMasterData(state);
}

function saveMasterData(state) {
  const data = getMasterData(state);
  state.dirtyFlags.masterData = false;

}

function addMasterDataValue(state, type, value) {
  if (!MASTER_DATA_TYPES[type]) return false;
  const clean = cleanMasterValue(value);
  if (!clean) return false;
  const current = getMasterData(state);
  state.data.masterData = {
    ...current,
    [type]: uniqueSorted([...(current[type] || []), clean]),
  };
  state.dirtyFlags.masterData = true;
  return true;
}

function deleteMasterDataValue(state, type, value) {
  if (!MASTER_DATA_TYPES[type]) return false;
  const clean = cleanMasterValue(value);
  const current = getMasterData(state);
  state.data.masterData = {
    ...current,
    [type]: uniqueSorted((current[type] || []).filter(item => item !== clean)),
  };

}

function buildOperationalSummary(state) {
  const data = state?.data || {};
  const tasks = data.tasks || [];
  const members = data.members || [];
  const activeTasks = tasks.filter(task => task.status !== 'Done');
  const today = new Date().toISOString().slice(0, 10);
  const weekEndDate = new Date();
  weekEndDate.setDate(weekEndDate.getDate() + 7);
  const weekEnd = weekEndDate.toISOString().slice(0, 10);
  const memberNames = new Set(members.map(member => String(member.name || '').trim()).filter(Boolean));
  const taskEvidence = task => (Array.isArray(task.evidence) ? task.evidence : [])
    .filter(item => String(item?.label || item?.url || item?.note || '').trim());
  const summarizeTask = task => ({
    id: task.id,
    name: task.name || '',
    owner: task.owner || '',
    due: task.due || '',
    priority: task.priority || '',
    status: task.status || '',
    blocked: Boolean(task.blocked),
    category: task.category || '',
    evidenceCount: taskEvidence(task).length,
  });
  const tasksWithEvidence = tasks.filter(task => taskEvidence(task).length);
  const missingEvidenceTasks = tasks
    .filter(task => (task.priority === 'High' || task.status === 'Done') && !taskEvidence(task).length)
    .sort((a, b) => {
      const priorityRank = { High: 0, Medium: 1, Low: 2 };
      const priority = (priorityRank[a.priority] ?? 9) - (priorityRank[b.priority] ?? 9);
      const due = String(a.due || '9999-12-31').localeCompare(String(b.due || '9999-12-31'));
      return priority || due || String(a.name || '').localeCompare(String(b.name || ''), 'en');
    })
    .slice(0, 20)
    .map(summarizeTask);
  const focusTasks = activeTasks
    .filter(task => task.blocked || task.priority === 'High' || (task.due && task.due <= weekEnd))
    .sort((a, b) => {
      const blocked = Number(Boolean(b.blocked)) - Number(Boolean(a.blocked));
      const overdue = Number(Boolean(b.due && b.due < today)) - Number(Boolean(a.due && a.due < today));
      const priorityRank = { High: 0, Medium: 1, Low: 2 };
      const priority = (priorityRank[a.priority] ?? 9) - (priorityRank[b.priority] ?? 9);
      const due = String(a.due || '9999-12-31').localeCompare(String(b.due || '9999-12-31'));
      return blocked || overdue || priority || due || String(a.name || '').localeCompare(String(b.name || ''), 'en');
    })
    .slice(0, 10)
    .map(summarizeTask);
  const unassignedTasks = activeTasks
    .filter((task) => {
      const owner = String(task.owner || '').trim();
      return !owner || owner === 'Unassigned' || !memberNames.has(owner);
    })
    .sort((a, b) => String(a.due || '9999-12-31').localeCompare(String(b.due || '9999-12-31')) || String(a.name || '').localeCompare(String(b.name || ''), 'en'))
    .slice(0, 10)
    .map(summarizeTask);
  const memberWorkload = members.map((member) => {
    const memberName = String(member.name || '').trim();
    const memberTasks = activeTasks.filter(task => String(task.owner || '').trim() === memberName);
    return {
      id: member.id,
      name: member.name || '',
      role: member.role || '',
      group: member.group || '',
      open: memberTasks.length,
      blocked: memberTasks.filter(task => task.blocked).length,
      high: memberTasks.filter(task => task.priority === 'High').length,
    };
  }).filter(row => row.open || row.blocked || row.high)
    .sort((a, b) => b.blocked - a.blocked || b.high - a.high || b.open - a.open || String(a.name || '').localeCompare(String(b.name || ''), 'en'))
    .slice(0, 10);
  const runScores = (data.missionRuns || []).map(run => Number(run.score || 0));
  return {
    window: { today, weekEnd },
    focusTasks,
    unassignedTasks,
    memberWorkload,
    evidenceSummary: {
      totalTasks: tasks.length,
      withEvidence: tasksWithEvidence.length,
      withoutEvidence: tasks.length - tasksWithEvidence.length,
      needsEvidence: missingEvidenceTasks.length,
    },
    missingEvidenceTasks,
    prepGaps: [
      ...(data.checklist || []).filter(item => !item.done).map(item => ({ type: 'checklist', id: item.id, title: item.label || '' })),
      ...(data.prediveChecklist || []).filter(item => !item.done).map(item => ({ type: 'preDive', id: item.id, title: item.label || '' })),
      ...(data.gearItems || []).filter(item => !item.packed).map(item => ({ type: 'gear', id: item.id, title: item.name || '', qty: item.qty || 1, category: item.category || '' })),
    ].slice(0, 20),
    intelGaps: [
      ...(data.intel || []).filter(item => item.status !== 'Ready').map(item => ({ type: 'intel', id: item.id, title: item.title || '', status: item.status || 'Draft' })),
      ...(data.strategy || []).filter(item => item.status !== 'Ready').map(item => ({ type: 'strategy', id: item.id, title: item.title || '', status: item.status || 'Draft' })),
    ].slice(0, 20),
    runSummary: runScores.length ? {
      latest: data.missionRuns?.[0] || null,
      best: Math.max(...runScores),
      average: Math.round(runScores.reduce((sum, score) => sum + score, 0) / runScores.length),
      count: runScores.length,
    } : null,
  };
}

    attachments: data.attachments?.length || 0,
    v15AuditLog: data.v15AuditLog?.length || 0,
    masterData,
    masterTotal: Object.values(masterData).reduce((sum, values) => sum + values.length, 0),
    smokeRuns: smokeHistory.length,
    healthIssues,
    missingEvidenceTasks,
    latestSmoke,
    failedSmoke,
    migrationSummary,
    dbStatus,
    syncPreview,
    writeResult,
    postWritePreview,
    schemaStatus,
    writeAuditLog,
    rollbackSummary,
    diagnosticsSummary,
  };
}

function scrollSettingsSection(id, root = document) {
  const target = root.getElementById(id);
  if (!target) return false;
  if (target.tagName === 'DETAILS') target.open = true;
  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  target.setAttribute('tabindex', '-1');
  target.focus({ preventScroll: true });
  return true;
}

                const [v15DbPassed, v15DbTotal] = String(value).split('/').map(Number);

                const v15DbOk = isV15Db && v15DbTotal > 0 && v15DbPassed === v15DbTotal;

                  : isV15Db
                    ? (v15DbOk ? 'var(--green)' : 'var(--orange)')
                    : 'var(--navy)';

          ` : `<div style="font-size:.8rem;color:var(--muted);font-weight:800">${escapeHtml(t('noDiagnosticsImported'))}</div>`}
        </div>

function buildReleaseReadiness(stats) {
  const hasData = (stats.tasks + stats.members + stats.checklist + stats.missionRuns + stats.gearItems) > 0;
  const smokeOk = Boolean(stats.latestSmoke && stats.failedSmoke === 0);
  const healthOk = (stats.healthIssues || []).length === 0;
  const evidenceOk = !stats.missingEvidenceTasks;
  const schemaOk = Boolean(stats.schemaStatus && Object.keys(stats.schemaStatus.tables || {}).length);
  const syncPrepared = Boolean(stats.dbStatus && !stats.dbStatus.error);
  const backupReady = true;
  const diagnosticsReady = true;
  const writeGuardReady = true;
  const checks = [
    {
      label: 'Workflow smoke',
      ok: smokeOk,
      detail: smokeOk ? 'Latest in-app smoke passed.' : 'Run Smoke Test before handoff.',
      action: smokeOk ? null : { label: 'Run', page: 'settings', settingsScroll: 'settings-health-section', readinessAction: 'run-smoke' },
    },
    {
      label: 'Supabase data',
      ok: hasData,
      detail: hasData ? 'Live Supabase data is loaded.' : 'Reload Supabase or add data through the app.',
      action: hasData ? null : { label: 'Reload', page: 'settings', settingsScroll: 'settings-db-section' },
    },
    {
      label: 'Data health',
      ok: healthOk,
      detail: healthOk ? 'No Supabase data health issues found.' : `${stats.healthIssues.length} data health issue(s) need review.`,
      action: healthOk ? null : { label: 'Open', page: 'settings', settingsScroll: 'settings-health-section' },
    },
    {
      label: 'Task evidence',
      ok: evidenceOk,
      detail: evidenceOk ? 'High-priority and completed tasks have evidence.' : `${stats.missingEvidenceTasks} task(s) need evidence before handoff.`,
      action: evidenceOk ? null : { label: 'Open', page: 'tasks', taskEvidencePreset: 'without' },
    },
    {
      label: 'Schema probe',
      ok: schemaOk,
      detail: schemaOk ? 'Supabase fields were probed.' : 'Run schema probe if writes fail.',
      action: schemaOk ? null : { label: 'Open', page: 'settings', settingsScroll: 'settings-schema-section' },
    },
    {
      label: 'Supabase connection',
      ok: syncPrepared,
      detail: syncPrepared ? 'Live database has been loaded.' : 'Reload Supabase DB.',
      action: syncPrepared ? null : { label: 'Reload', page: 'settings', settingsScroll: 'settings-db-section' },
    },
    {
      label: 'Reports',
      ok: backupReady,
      detail: 'Handoff, diagnostics, action log, and safety reports are available.',
    },
    {
      label: 'Safety guard',
      ok: writeGuardReady,
      detail: 'CRUD writes go directly to Supabase; deprecated local backup/sync tools are hidden.',
    },
    {
      label: 'Diagnostics',
      ok: diagnosticsReady,
      detail: 'Export/import diagnostics viewer is available.',
    },
  ];
  const passed = checks.filter(check => check.ok).length;
  return {
    checks,
    passed,
    total: checks.length,
    ready: passed === checks.length,
  };
}

function renderSyncDetailGroup(title, rows = []) {
  if (!rows.length) return `<div style="font-size:.76rem;color:var(--muted);font-weight:800">${escapeHtml(title)}: none</div>`;
  return `

function syncSignatureForData(data = {}) {
  const normalizeTask = task => ({
    id: Number(task.id || 0),
    name: String(task.name || ''),
    owner: String(task.owner || ''),
    due: String(task.due || ''),
    priority: String(task.priority || ''),
    status: String(task.status || ''),
    category: String(task.category || task.cat || ''),
  });
  const normalizeMember = member => ({
    id: Number(member.id || 0),
    name: String(member.name || ''),
    role: String(member.role || ''),
    group: String(member.group || ''),
  });
  const normalizeChecklist = item => ({
    id: Number(item.id || item.item_id || 0),
    label: String(item.label || item.name || ''),
    done: Boolean(item.done),
  });
  const normalizeIntel = item => ({
    id: Number(item.id || 0),
    title: String(item.title || item.name || ''),
    content: String(item.content || item.note || item.notes || ''),
    status: String(item.status || ''),
  });
  const normalizeMissionRun = run => ({
    id: Number(run.id || 0),
    score: Number(run.score || run.total_score || 0),
    elapsedSeconds: Number(run.elapsedSeconds || run.elapsed_seconds || run.seconds || 0),
    note: String(run.note || run.notes || ''),
    ts: String(run.ts || run.runDate || run.run_date || run.created_at || ''),
  });
  const normalizeQuote = quote => ({
    id: Number(quote.id || 0),
    text: String(quote.text || quote.content || quote.quote || ''),
  });
  const normalizeAttachment = attachment => ({
    id: Number(attachment.id || 0),
    taskId: Number(attachment.taskId || attachment.task_id || 0),
    label: String(attachment.label || attachment.file_name || ''),
    url: String(attachment.url || attachment.public_url || ''),
  });
  const byId = (a, b) => Number(a.id || 0) - Number(b.id || 0)
    || String(a.name || a.label || a.title || '').localeCompare(String(b.name || b.label || b.title || ''));
  return JSON.stringify({
    tasks: (data.tasks || []).map(normalizeTask).sort(byId),
    members: (data.members || []).map(normalizeMember).sort(byId),
    checklist: (data.checklist || []).map(normalizeChecklist).sort(byId),
    prediveChecklist: (data.prediveChecklist || []).map(normalizeChecklist).sort(byId),
    intel: (data.intel || []).map(normalizeIntel).sort(byId),
    strategy: (data.strategy || []).map(normalizeIntel).sort(byId),
    missionRuns: (data.missionRuns || []).map(normalizeMissionRun).sort(byId),
    practiceRuns: (data.practiceRuns || []).map(normalizeMissionRun).sort(byId),
    quotes: (data.quotes || []).map(normalizeQuote).sort(byId),
    attachments: (data.attachments || []).map(normalizeAttachment).sort(byId),
    notes: String(data.notes || ''),
  });
}

function getLocalSyncSignature() {

function normalizeTaskEvidenceForSync(task = {}) {
  return (Array.isArray(task.evidence) ? task.evidence : [])
    .map((item, index) => ({
      id: Number(item?.id || `${task.id || Date.now()}${index + 1}`),
      task_id: Number(task.id || 0),
      file_name: String(item?.label || item?.name || item?.title || item?.url || `Evidence ${index + 1}`).trim(),
      public_url: String(item?.url || item?.href || item?.link || '').trim(),
      file_path: String(item?.path || item?.url || item?.href || item?.link || '').trim(),
      mime_type: String(item?.note || item?.type || 'link').trim(),
    }))
    .filter(row => row.task_id && (row.file_name || row.public_url || row.file_path || row.mime_type));
}

function getMissingColumnFromSupabaseError(error) {
  const message = String(error?.message || '');
  const match = message.match(/Could not find the '([^']+)' column/i)
    || message.match(/column "([^"]+)" .*does not exist/i);
  return match?.[1] || '';
}

async function upsertTaskEvidenceRows(client, task = {}) {
  let rows = normalizeTaskEvidenceForSync(task);
  if (!rows.length) return { ok: true, written: 0, skipped: true, error: '' };
  const droppedFields = [];
  for (let attempt = 0; attempt < 6; attempt += 1) {
    const { error } = await client.from('task_attachments').upsert(rows, { onConflict: 'id' });
    if (!error) return { ok: true, written: rows.length, droppedFields, error: '' };
    const missingField = getMissingColumnFromSupabaseError(error);
    if (!missingField || droppedFields.includes(missingField)) {
      return { ok: false, written: 0, droppedFields, error: error.message || String(error) };
    }
    droppedFields.push(missingField);
    rows = rows.map((row) => {
      const next = { ...row };
      delete next[missingField];
      return next;
    });
  }
  return { ok: false, written: 0, droppedFields, error: 'task_attachments schema fallback exceeded retry limit' };
}

async function confirmSupabaseTasksSync(message = t('saved')) {
  try {
    const before = lastDbStatus?.data ? lastDbStatus : await loadSupabaseReadOnly();
    const client = await ensureSupabaseClient();
    const preview = buildSupabaseSyncPreview(appState, before);
    const result = await executeAutoSupabaseWriteSync(client, appState, before, { schemaStatus: lastSchemaStatus, tables: ['tasks'] });
    const taskEvidenceResults = await Promise.all((appState.data.tasks || []).map(task => upsertTaskEvidenceRows(client, task)));
    const evidenceError = taskEvidenceResults.find(row => !row.ok);
    lastWriteResult = result;
    const summary = summarizeWriteResult(result);
    saveWriteAuditEntry(buildWriteAuditEntry({ preview, writeResult: result, postWritePreview: null, tables: ['tasks'] }));
    if (!summary.ok || evidenceError) {
      setPendingLocalSync(true);
      setSyncStatus('error', 'Supabase failed', summary.errors[0]?.error || evidenceError?.error || 'Unknown Supabase write error');
      showToast(`${message} | Supabase sync failed: ${summary.errors[0]?.error || evidenceError?.error || 'Unknown error'}`, 'error');
      recordAction('Task Supabase sync failed', 'error');
      renderAppShell();
      return false;
    }
    lastDbStatus = await loadSupabaseReadOnly();
    lastPostWritePreview = buildSupabaseSyncPreview(appState, lastDbStatus);
    const taskTable = lastPostWritePreview.tables.find(table => table.label === 'tasks');
    if (taskTable?.create || taskTable?.update || taskTable?.remove) {
      setPendingLocalSync(true);
      setSyncStatus('error', 'Supabase unconfirmed', 'Supabase did not confirm the task update.');
      showToast(`${message} | Supabase did not confirm the task update.`, 'error');
      recordAction('Task Supabase confirmation failed', 'error');
      renderAppShell();
      return false;
    }
    markLocalDataSynced();
    showToast(`${message} | Synced to Supabase`);
    recordAction(`${message} | Synced to Supabase`);
    renderAppShell();
    return true;
  } catch (error) {
    setPendingLocalSync(true);
    setSyncStatus('error', 'Supabase failed', error.message || String(error));
    showToast(`${message} | Supabase sync failed: ${error.message || error}`, 'error');
    recordAction('Task Supabase sync failed', 'error');
    renderAppShell();
    return false;
  }
}

  saveAppState(appState);

function scheduleAutoSupabaseSync(delayMs = 0) {
  autoSyncQueued = true;
  setSyncStatus('pending', 'Supabase pending', 'Changes are queued for Supabase.');
  if (autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(runAutoSupabaseSync, delayMs);
}

async function runAutoSupabaseSync() {
  autoSyncTimer = null;
  if (!autoSyncQueued || autoSyncInFlight) return;
  autoSyncQueued = false;
  autoSyncInFlight = true;
  setSyncStatus('syncing', 'Syncing Supabase', 'Writing queued changes to Supabase.');
  try {
    if (!lastDbStatus?.data || lastDbStatus.error) {
      lastDbStatus = await loadSupabaseReadOnly();
    }
    const preview = buildSupabaseSyncPreview(appState, lastDbStatus);
    const hasWrites = preview.totalCreate + preview.totalUpdate + preview.totalRemove > 0;
    if (!hasWrites) {
      markLocalDataSynced();
      return;
    }
    const client = await ensureSupabaseClient();
    const result = await executeAutoSupabaseWriteSync(client, appState, lastDbStatus, { schemaStatus: lastSchemaStatus });
    lastWriteResult = result;
    const summary = summarizeWriteResult(result);
    saveWriteAuditEntry(buildWriteAuditEntry({ preview, writeResult: result, postWritePreview: null, tables: undefined }));
    if (!summary.ok) {
      setPendingLocalSync(true);
      setSyncStatus('error', 'Supabase failed', summary.errors[0]?.error || 'Unknown Supabase write error');
      showToast(`Auto Supabase sync failed: ${summary.errors[0]?.error || 'Unknown error'}`, 'error');
      recordAction('Auto Supabase sync failed', 'error');
      renderAppShell();
      return;
    }
    lastDbStatus = await loadSupabaseReadOnly();
    lastPostWritePreview = buildSupabaseSyncPreview(appState, lastDbStatus);
    if (lastPostWritePreview.totalCreate + lastPostWritePreview.totalUpdate + lastPostWritePreview.totalRemove === 0) {
      markLocalDataSynced();
    } else {
      setPendingLocalSync(true);
      setSyncStatus('error', 'Supabase unconfirmed', 'Supabase still differs after write.');
      showToast('Auto Supabase sync incomplete. Changes are not confirmed online.', 'error');
      recordAction('Auto Supabase sync incomplete', 'error');
    }
    showToast(`Synced to Supabase: ${summary.written}`);
    recordAction(`Synced to Supabase: ${summary.written}`);
    renderAppShell();
  } catch (error) {
    setPendingLocalSync(true);
    setSyncStatus('error', 'Supabase failed', error.message || String(error));
    showToast(`Auto Supabase sync failed: ${error.message || error}`, 'error');
    recordAction('Auto Supabase sync failed', 'error');
    renderAppShell();
  } finally {
    autoSyncInFlight = false;
    if (autoSyncQueued) scheduleAutoSupabaseSync(300);
  }
}

function stripSentenceEnd(value = '') {

}

function updateTaskFiltersFromControl(target) {

    ['search', '[data-task-search]'],
    ['owner', '[data-task-owner-filter]'],
    ['status', '[data-task-status-filter]'],
    ['priority', '[data-task-priority-filter]'],
    ['category', '[data-task-category-filter]'],
    ['health', '[data-task-health-filter]'],
    ['evidence', '[data-task-evidence-filter]'],
    ['sort', '[data-task-sort]'],
  ];
  const row = updates.find(([, selector]) => target.closest(selector));
  if (!row) return false;
  taskFilters[row[0]] = target.value || '';
  return true;
}
