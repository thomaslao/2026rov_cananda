    :root {
      color-scheme: light;

      --bg: #f7fafc;
      --white: #ffffff;

    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;

    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 8px;
      background: var(--blue);
      color: white;
      text-decoration: none;
      font-weight: 900;
